<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/static/js/tracker.js"></script>
  <script src="/static/js/nav.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-indigo-50 text-slate-800 min-h-screen">

  <div id="tn-nav-root"></div>

  <main class="flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-indigo-400 to-indigo-600"></div>
        <div class="p-8">
          <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center mb-3">
              <i data-lucide="log-in" class="w-6 h-6 text-indigo-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Agent Login</h1>
            <p class="text-sm text-slate-500 mt-1">Sign in to your agent dashboard</p>
          </div>

          <form x-data="loginForm()" @submit.prevent="handleLogin" class="space-y-4">
            <div>
              <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
              <input type="email" id="email" x-model="email" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
            </div>
            <div>
              <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
              <input type="password" id="password" x-model="password" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
            </div>
            <div class="flex items-center justify-between text-sm">
              <label class="flex items-center gap-2 text-slate-600">
                <input type="checkbox" class="rounded border-slate-300 text-indigo-500 focus:ring-indigo-400">
                Remember me
              </label>
              <a href="#" class="text-indigo-600 hover:text-indigo-700 font-medium">Forgot password?</a>
            </div>
            <button type="submit"
              class="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md transition">
              Sign In
            </button>
          </form>

          <p class="text-center text-sm text-slate-500 mt-6">
            Don't have an account?
            <a href="register_agent.html" class="text-indigo-600 hover:text-indigo-700 font-medium">Register</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    function loginForm() {
      return {
        email: '',
        password: '',
        handleLogin() {
          console.log('Agent login:', this.email);
        }
      };
    }
  </script>
</body>
</html>
