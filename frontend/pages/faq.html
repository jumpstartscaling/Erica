<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frequently Asked Questions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/static/js/tracker.js"></script>
  <script src="/static/js/nav.js"></script>
  <script>
    function faqData() {
      return {
        items: [
          {
            id: 1,
            q: 'What services do you offer?',
            a: 'We provide educational coaching, SMS-based learning tools, and a comprehensive learning management platform. Our services are designed to support both individual learners and organizations.',
            open: false,
          },
          {
            id: 2,
            q: 'How do coaching sessions work?',
            a: 'Coaching sessions are conducted virtually via video call. Each session is 60 minutes and tailored to your specific learning goals. You can book single sessions or purchase a 6-month package for ongoing support.',
            open: false,
          },
          {
            id: 3,
            q: 'What is A2P 10DLC and why do I need it?',
            a: 'A2P 10DLC (Application-to-Person 10-Digit Long Code) is a standard for business messaging in the US. It ensures compliance with carrier requirements, improves message deliverability, and protects consumers from spam. Upgrading is required for SMS-based features.',
            open: false,
          },
          {
            id: 4,
            q: 'How is my data protected?',
            a: 'We use industry-standard encryption for data in transit and at rest. Personal information is never shared with third parties without your explicit consent. Full details are available in our Privacy Policy.',
            open: false,
          },
          {
            id: 5,
            q: 'What is the cancellation policy?',
            a: 'Single sessions can be cancelled up to 24 hours before the scheduled time for a full refund. Package subscriptions may be cancelled with 30 days notice. Please see our Terms of Service for complete details.',
            open: false,
          },
          {
            id: 6,
            q: 'Do you offer group or corporate rates?',
            a: 'Yes, we offer discounted group rates for teams and organizations. Contact us with your requirements and we will provide a customized quote based on the number of learners and scope of services.',
            open: false,
          },
          {
            id: 7,
            q: 'How long does it take to see results?',
            a: 'Most learners report noticeable improvement within 4-6 weeks of regular coaching sessions. The 6-month package is designed for sustained, measurable progress with structured milestones.',
            open: false,
          },
          {
            id: 8,
            q: 'What technical requirements are needed?',
            a: 'A stable internet connection, a device with a modern web browser, and the ability to receive SMS messages (for text-based features). No special software installation is required.',
            open: false,
          },
        ],
        toggle(id) {
          this.items = this.items.map(item => ({
            ...item,
            open: item.id === id ? !item.open : false,
          }));
        },
      };
    }
  </script>
  <style>
    .gradient-hero {
      background: linear-gradient(135deg, #0f766e 0%, #1d4ed8 50%, #7c3aed 100%);
    }
    .faq-enter {
      animation: faqFadeIn 0.25s ease-out;
    }
    @keyframes faqFadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800" x-data="faqData()">
  <div id="tn-nav-root"></div>

  <section class="gradient-hero relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PGNpcmNsZSBjeD0iMzAiIGN5PSIzMCIgcj0iMiIvPjwvZz48L2c+PC9zdmc+')] opacity-40"></div>
    <div class="relative mx-auto max-w-4xl px-6 py-16 text-center">
      <span class="inline-block rounded-full bg-white/10 px-4 py-1.5 text-sm font-medium text-white/80 backdrop-blur-sm">Help Center</span>
      <h1 class="mt-6 text-4xl font-bold tracking-tight text-white sm:text-5xl">Frequently Asked Questions</h1>
      <p class="mx-auto mt-4 max-w-2xl text-lg text-indigo-200">Everything you need to know about our services, coaching, and platform.</p>
    </div>
  </section>

  <section class="mx-auto max-w-3xl px-6 py-12">
    <template x-for="item in items" :key="item.id">
      <div class="mb-3 overflow-hidden rounded-xl border border-slate-200 bg-white transition-shadow duration-200" :class="{ 'shadow-md': item.open }">
        <button @click="toggle(item.id)" class="flex w-full items-center justify-between px-6 py-5 text-left transition-colors hover:bg-slate-50">
          <span class="pr-4 text-base font-semibold text-slate-800" x-text="item.q"></span>
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 transition-all duration-200" :class="{ 'bg-indigo-100 text-indigo-600': item.open, 'text-slate-400': !item.open }">
            <i :data-lucide="item.open ? 'minus' : 'plus'" class="h-5 w-5"></i>
          </div>
        </button>
        <div x-show="item.open" x-cloak class="faq-enter border-t border-slate-100 px-6 pb-5 pt-4">
          <p class="text-base leading-relaxed text-slate-600" x-text="item.a"></p>
        </div>
      </div>
    </template>

    <div class="mt-10 rounded-xl bg-gradient-to-br from-indigo-50 to-purple-50 p-8 text-center">
      <i data-lucide="help-circle" class="mx-auto h-10 w-10 text-indigo-400"></i>
      <h3 class="mt-3 text-lg font-bold text-slate-800">Still have questions?</h3>
      <p class="mt-1 text-sm text-slate-500">We're here to help. Reach out to our support team.</p>
      <button class="mt-4 inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-3 text-sm font-semibold text-white shadow-lg transition-all hover:from-indigo-500 hover:to-purple-500">
        <i data-lucide="mail" class="h-4 w-4"></i>
        <span>Contact Support</span>
      </button>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
