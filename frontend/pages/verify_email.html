<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify Your Email — Tranzformation Nation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="/static/js/tracker.js"></script>
</head>
<body class="grid min-h-screen place-items-center bg-slate-100 px-4 text-slate-800">
  <main class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm" x-data="verify()" x-init="init()">
    <a href="/" class="mb-6 flex items-center justify-center gap-2 font-bold text-slate-900"><span class="grid h-8 w-8 place-items-center rounded-lg bg-emerald-500 text-white">TN</span> Tranzformation Nation</a>

    <template x-if="!token">
      <div>
        <h1 class="text-2xl font-bold">Check your email</h1>
        <p class="mt-3 text-slate-600">We sent a verification link to your inbox. Click it to activate your account.</p>
        <p class="mt-4 rounded-lg bg-amber-50 p-3 text-sm text-amber-700">Dev note: email is stubbed — the verification link is printed to the server console.</p>
      </div>
    </template>

    <template x-if="token">
      <div>
        <h1 class="text-2xl font-bold" x-text="ok ? 'Email verified' : (done ? 'Verification failed' : 'Verifying…')"></h1>
        <p class="mt-3 text-slate-600" x-text="message"></p>
        <template x-if="ok">
          <div class="mt-6 flex flex-col gap-2">
            <a href="/login/customer" class="rounded-lg bg-emerald-500 px-4 py-2.5 font-semibold text-white hover:bg-emerald-600">Customer Login</a>
            <a href="/login/agent" class="rounded-lg border border-slate-300 px-4 py-2.5 font-semibold hover:bg-slate-50">Agent Login</a>
          </div>
        </template>
      </div>
    </template>
  </main>

  <script>
    function verify() {
      return {
        token: new URLSearchParams(location.search).get("token") || "",
        ok: false, done: false, message: "",
        async init() {
          if (!this.token) return;
          this.message = "Please wait…";
          try {
            const res = await fetch("/api/verify?token=" + encodeURIComponent(this.token));
            const d = await res.json();
            this.done = true;
            if (d.ok) { this.ok = true; this.message = "Your email (" + d.email + ") is verified. You can now log in."; }
            else { this.ok = false; this.message = d.error || "Could not verify."; }
          } catch (e) { this.done = true; this.message = "Network error. Please try again."; }
        },
      };
    }
  </script>
</body>
</html>
