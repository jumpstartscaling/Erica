<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard — Tranzformation Nation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="/static/js/tracker.js"></script>
</head>
<body class="bg-slate-50 text-slate-800" x-data="admin()" x-init="init()">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/admin" class="flex items-center gap-2 font-bold text-slate-900"><span class="grid h-8 w-8 place-items-center rounded-lg bg-indigo-600 text-white">TN</span> Admin</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="/a2p" class="text-slate-600 hover:text-indigo-600">Messaging Upgrade</a>
        <button @click="logout" data-track="logout" class="font-medium text-slate-600 hover:text-rose-600">Logout</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10">
    <h1 class="text-2xl font-bold">Overview</h1>

    <!-- Stat cards -->
    <div class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <template x-for="card in cards" :key="card.key">
        <div class="rounded-2xl border border-slate-200 bg-white p-5">
          <p class="text-sm text-slate-500" x-text="card.label"></p>
          <p class="mt-1 text-3xl font-extrabold text-slate-900" x-text="stats[card.key] ?? '—'"></p>
        </div>
      </template>
    </div>

    <!-- Funnel as Tailwind bars (NO charting library) -->
    <section class="mt-10 rounded-2xl border border-slate-200 bg-white p-6">
      <h2 class="font-semibold text-slate-900">Conversion Funnel</h2>
      <p class="text-sm text-slate-500">Event counts from the <code>events</code> table (widths are % of the top step).</p>
      <div class="mt-5 space-y-3">
        <template x-for="step in funnel" :key="step.event_name">
          <div>
            <div class="flex justify-between text-sm">
              <span x-text="step.label"></span>
              <span class="font-semibold" x-text="step.count + ' (' + step.pct + '%)'"></span>
            </div>
            <div class="mt-1 h-6 w-full overflow-hidden rounded-lg bg-slate-100">
              <div class="flex h-6 items-center rounded-lg bg-indigo-500 px-2 text-xs font-semibold text-white transition-all"
                   :style="'width:' + Math.min(Math.max(step.pct, 2), 100) + '%'"
                   x-text="step.event_name"></div>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- Recent users -->
    <section class="mt-10 rounded-2xl border border-slate-200 bg-white p-6">
      <h2 class="font-semibold text-slate-900">Users</h2>
      <div class="mt-4 overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="text-slate-500"><tr>
            <th class="py-2 pr-4">ID</th><th class="py-2 pr-4">Email</th><th class="py-2 pr-4">Role</th>
            <th class="py-2 pr-4">Status</th><th class="py-2 pr-4">Verified</th><th class="py-2 pr-4">Created</th>
          </tr></thead>
          <tbody>
            <template x-for="u in users" :key="u.id">
              <tr class="border-t border-slate-100">
                <td class="py-2 pr-4" x-text="u.id"></td>
                <td class="py-2 pr-4" x-text="u.email"></td>
                <td class="py-2 pr-4"><span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs" x-text="u.role"></span></td>
                <td class="py-2 pr-4" x-text="u.approval_status"></td>
                <td class="py-2 pr-4" x-text="u.email_verified ? 'yes' : 'no'"></td>
                <td class="py-2 pr-4 text-slate-500" x-text="(u.created_at||'').slice(0,10)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>

    <p class="mt-6 text-xs text-slate-400">Admin URLs and analytics are never exposed in public HTML. See docs/PUBLIC_VIEW_CHANGES.md.</p>
  </main>

  <script>
    function admin() {
      return {
        stats: {}, funnel: [], users: [],
        cards: [
          { key: "users_total", label: "Total users" },
          { key: "verified_accounts", label: "Verified accounts" },
          { key: "agents_pending", label: "Agents pending" },
          { key: "webinar_starts", label: "Webinar entries" },
          { key: "events_total", label: "Tracked events" },
          { key: "customers", label: "Customers" },
          { key: "coaching_requests", label: "Coaching requests" },
          { key: "purchases", label: "Active purchases" },
        ],
        async init() {
          const me = await fetch("/api/me");
          if (me.status === 401) { window.location.href = "/login/customer"; return; }
          const meData = await me.json();
          if (!meData.user || meData.user.role !== "admin") { window.location.href = "/"; return; }
          const [s, f, u] = await Promise.all([
            fetch("/api/admin/stats").then(r => r.json()),
            fetch("/api/admin/funnel").then(r => r.json()),
            fetch("/api/admin/users").then(r => r.json()),
          ]);
          this.stats = s.stats || {}; this.funnel = f.steps || []; this.users = u.users || [];
        },
        async logout() { await fetch("/api/logout", { method: "POST" }); window.location.href = "/"; },
      };
    }
  </script>
</body>
</html>
