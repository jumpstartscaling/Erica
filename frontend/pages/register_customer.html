<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Customer Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/static/js/tracker.js"></script>
  <script src="/static/js/nav.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-emerald-50 text-slate-800 min-h-screen">

  <div id="tn-nav-root"></div>

  <main class="flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-emerald-400 to-emerald-600"></div>
        <div class="p-8">
          <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center mb-3">
              <i data-lucide="user-plus" class="w-6 h-6 text-emerald-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Create Your Customer Account</h1>
            <p class="text-sm text-slate-500 mt-1">Join us and get started</p>
          </div>

          <ul class="space-y-2 mb-6 text-sm text-slate-600">
            <li class="flex items-start gap-2">
              <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500 mt-0.5 shrink-0"></i>
              <span>Track your orders and manage subscriptions</span>
            </li>
            <li class="flex items-start gap-2">
              <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500 mt-0.5 shrink-0"></i>
              <span>Access exclusive resources and support</span>
            </li>
            <li class="flex items-start gap-2">
              <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500 mt-0.5 shrink-0"></i>
              <span>Secure account management with 2FA</span>
            </li>
          </ul>

          <form x-data="registerForm()" @submit.prevent="handleRegister" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label for="first_name" class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
                <input type="text" id="first_name" x-model="first_name" required
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition">
              </div>
              <div>
                <label for="last_name" class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
                <input type="text" id="last_name" x-model="last_name" required
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition">
              </div>
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
              <input type="email" id="email" x-model="email" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition">
            </div>
            <div>
              <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
              <input type="password" id="password" x-model="password" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition">
            </div>
            <div>
              <label for="confirm" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
              <input type="password" id="confirm" x-model="confirm" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition">
            </div>
            <div class="space-y-2">
              <label class="flex items-start gap-2 text-sm text-slate-600">
                <input type="checkbox" x-model="agree" required
                  class="mt-0.5 rounded border-slate-300 text-emerald-500 focus:ring-emerald-400">
                <span>I agree to the <a href="#" class="text-emerald-600 hover:text-emerald-700 font-medium">Terms of Service</a> and <a href="#" class="text-emerald-600 hover:text-emerald-700 font-medium">Privacy Policy</a></span>
              </label>
              <label class="flex items-start gap-2 text-sm text-slate-600">
                <input type="checkbox" x-model="marketing"
                  class="mt-0.5 rounded border-slate-300 text-emerald-500 focus:ring-emerald-400">
                <span>I'd like to receive marketing emails (optional)</span>
              </label>
            </div>
            <button type="submit"
              class="w-full py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold shadow-md transition">
              Create Account
            </button>
          </form>

          <p class="text-center text-sm text-slate-500 mt-6">
            Already have an account?
            <a href="login_customer.html" class="text-emerald-600 hover:text-emerald-700 font-medium">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    function registerForm() {
      return {
        first_name: '',
        last_name: '',
        email: '',
        password: '',
        confirm: '',
        agree: false,
        marketing: false,
        handleRegister() {
          console.log('Customer register:', this.email);
        }
      };
    }
  </script>
</body>
</html>
