<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/static/js/tracker.js"></script>
  <script src="/static/js/nav.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-sky-50 text-slate-800 min-h-screen" x-data="verify()" x-init="init()">

  <div id="tn-nav-root"></div>

  <main class="flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-sky-400 to-sky-600"></div>
        <div class="p-8 text-center">
          <template x-if="!token">
            <div>
              <div class="flex flex-col items-center mb-6">
                <div class="w-14 h-14 rounded-full bg-sky-100 flex items-center justify-center mb-4">
                  <i data-lucide="mail-check" class="w-7 h-7 text-sky-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Check Your Email</h1>
              </div>
              <p class="text-slate-600 mb-2">We've sent a verification link to your email address.</p>
              <p class="text-sm text-slate-500 mb-6">Click the link to activate your account and get started.</p>
              <div class="bg-sky-50 rounded-xl p-4 mb-6 text-sm text-slate-600">
                <p class="font-medium text-sky-800 mb-1">Didn't receive the email?</p>
                <p>Check your spam folder or <a href="#" class="text-sky-600 hover:text-sky-700 font-medium">resend verification</a>.</p>
              </div>
              <div class="space-y-3">
                <a href="/login/customer" class="block w-full py-2.5 rounded-xl bg-sky-600 hover:bg-sky-700 text-white font-semibold shadow-md transition">Go to Customer Login</a>
                <a href="/login/agent" class="block w-full py-2.5 rounded-xl border border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold transition">Go to Agent Login</a>
              </div>
            </div>
          </template>
          <template x-if="token">
            <div>
              <div class="flex flex-col items-center mb-6">
                <div class="w-14 h-14 rounded-full" :class="ok ? 'bg-emerald-100' : 'bg-rose-100'" flex items-center justify-center mb-4">
                  <i :data-lucide="ok ? 'check-circle' : 'x-circle'" class="w-7 h-7" :class="ok ? 'text-emerald-600' : 'text-rose-600'"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800" x-text="ok ? 'Email Verified' : (done ? 'Verification Failed' : 'Verifying…')"></h1>
              </div>
              <p class="text-slate-600 mb-6" x-text="message"></p>
              <template x-if="ok">
                <div class="space-y-3">
                  <a href="/login/customer" class="block w-full py-2.5 rounded-xl bg-sky-600 hover:bg-sky-700 text-white font-semibold shadow-md transition">Customer Login</a>
                  <a href="/login/agent" class="block w-full py-2.5 rounded-xl border border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold transition">Agent Login</a>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>
  </main>

  <script>
    function verify() {
      return {
        token: '', ok: false, done: false, message: '',
        init() {
          this.token = new URLSearchParams(location.search).get('token') || '';
          if (!this.token) return;
          fetch('/api/verify?token=' + encodeURIComponent(this.token)).then(r => r.json()).then(d => {
            this.done = true;
            if (d.ok) { this.ok = true; this.message = 'Your email ' + d.email + ' has been verified.'; }
            else { this.ok = false; this.message = d.error || 'Invalid or expired verification link.'; }
          }).catch(() => { this.done = true; this.ok = false; this.message = 'Network error.'; });
        },
      };
    }
    document.addEventListener("DOMContentLoaded", function () { if (window.lucide) lucide.createIcons(); });
  </script>
</body>
</html>
